<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌌 BACKGROUND */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    height: 100vh;
    color: #2a2a2a;

    background:
        radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.35), transparent 35%),
        radial-gradient(circle at 90% 80%, rgba(248, 200, 220, 0.35), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(255, 228, 196, 0.25), transparent 45%),
        linear-gradient(135deg, #fff6f8, #f7efe8);
}

/* floating blobs */
.blob {
    position: absolute;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.5;
    animation: float 14s infinite ease-in-out;
}

.blob:nth-child(1){ top:8%; left:10%; background:#ffb6c1; }
.blob:nth-child(2){ bottom:10%; right:8%; background:#f8c8dc; }
.blob:nth-child(3){ top:55%; left:65%; background:#ffe4c4; }

@keyframes float {
    0%,100%{ transform: translateY(0px) scale(1); }
    50%{ transform: translateY(-30px) scale(1.08); }
}

/* container */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* pages */
.page {
    position: absolute;
    width: 85%;
    max-width: 760px;
    text-align: center;

    opacity: 0;
    transform: translateY(25px) scale(0.96);
    transition: all 0.75s ease;

    padding: 38px;
    border-radius: 28px;

    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(22px);

    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    pointer-events: none;
}

.page.active {
    opacity: 1;
    transform: translateY(0px) scale(1);
    pointer-events: auto;
}

/* text */
h1 {
    font-family: 'Playfair Display', serif;
    color: #c85c7a;
}

p {
    font-size: 17px;
    line-height: 1.7;
}

/* buttons */
button {
    margin: 10px;
    padding: 12px 28px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #ff9bb3, #ff6f91);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* teddy */
.teddy {
    font-size: 28px;
    margin-top: 15px;
    display: inline-block;
    opacity: 0.9;
}

/* idle breathing */
.teddy.idle {
    animation: breathe 2.5s infinite ease-in-out;
}

@keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.04); }
}

/* bass pulse */
.teddy.pulse {
    animation: pulse 0.35s ease-out;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* progress */
#progress {
    position: fixed;
    top: 18px;
    right: 22px;
    background: rgba(255,255,255,0.7);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
}

</style>
</head>

<body>

<div class="blob"></div>
<div class="blob"></div>
<div class="blob"></div>

<div id="progress">1 / 30</div>

<audio id="music" src="music.mp3" loop></audio>

<div class="container">

<!-- 1 -->
<div class="page active">
<h1>HI LOVE ❤️</h1>
<p>This is something small… but full of meaning.</p>
<button onclick="start()">Begin</button>
<div class="teddy idle">🧸</div>
</div>

<!-- 2 -->
<div class="page">
<h1>Welcome to Your Best Year Yet</h1>
<p>A journey made just for you.</p>
<div class="nav">
<button onclick="prev()">Back</button>
<button onclick="next()">Next</button>
</div>
<div class="teddy idle">🧸</div>
</div>

<!-- 3 -->
<div class="page">
<h1>Happy Birthday ❤️</h1>
<p>Every page is a piece of my heart.</p>
<div class="nav">
<button onclick="prev()">Back</button>
<button onclick="next()">Next</button>
</div>
<div class="teddy idle">🧸</div>
</div>

<!-- MESSAGE PAGES (sample compressed pattern repeated) -->
<script>
const messages = [
"You are my baby. Protective, passionate, kind, romantic, emotional, and soft in ways you don’t even see in yourself.",
"It felt natural… like something meant to happen.",
"Our first date was simple, calm, and real.",
"That night at Latitude felt like the world disappeared.",
"I notice how you care even in small ways.",
"I could say I love you in 50 ways and still not be enough.",
"Even when you annoy me… I still smile.",
"I miss you in quiet moments.",
"You make my life easier just by being you.",
"You feel like calm in chaos.",
"I believe in your dreams even when you doubt yourself.",
"Your dream is unfolding beautifully.",
"You grow, I grow, we don’t limit each other.",
"One day… Paris.",
"Old Trafford together laughing.",
"We still have places to go.",
"I pray for your happiness.",
"I will always be in your corner.",
"Thank you for being you.",
"If I had to choose again… I’d still choose you."
];

const container = document.querySelector(".container");

messages.forEach((msg,i)=>{
    const div = document.createElement("div");
    div.className = "page";
    div.innerHTML = `
        <p>${msg}</p>
        <div class="nav">
            <button onclick="prev()">Back</button>
            <button onclick="next()">Next</button>
        </div>
        <div class="teddy idle">🧸</div>
    `;
    container.appendChild(div);
});
</script>

<!-- FINAL -->
<div class="page">
<h1>You mean the world to me</h1>
<p>Even in hard times, I love being your smile ❤️</p>
<p>HAPPY BIRTHDAY ❤️</p>
<div class="teddy idle">🧸</div>
</div>

</div>

<script>

let current = 0;
const pages = document.querySelectorAll(".page");
const music = document.getElementById("music");
const progress = document.getElementById("progress");

let ctx, analyser, dataArray;

function start(){
    show(1);
    music.play().catch(()=>{});
    setupAudio();
}

function show(i){
    pages.forEach(p=>p.classList.remove("active"));
    pages[i].classList.add("active");
    current = i;
    progress.innerText = `${i+1} / ${pages.length}`;
    pulse();
}

function next(){ if(current < pages.length-1) show(current+1); }
function prev(){ if(current > 0) show(current-1); }

function pulse(){
    document.querySelectorAll(".teddy").forEach(t=>{
        t.classList.remove("pulse");
        void t.offsetWidth;
        t.classList.add("pulse");
    });
}

/* AUDIO BASS SYNC */
function setupAudio(){
    if(ctx) return;

    ctx = new AudioContext();
    const src = ctx.createMediaElementSource(music);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;

    src.connect(analyser);
    analyser.connect(ctx.destination);

    dataArray = new Uint8Array(analyser.frequencyBinCount);

    detect();
}

function detect(){
    analyser.getByteFrequencyData(dataArray);

    let bass = 0;
    for(let i=0;i<10;i++) bass += dataArray[i];
    bass /= 10;

    if(bass > 120){
        pulse();
    }

    requestAnimationFrame(detect);
}

document.addEventListener("click",()=>{
    if(music.paused) music.play();
    if(ctx && ctx.state === "suspended") ctx.resume();
});

</script>

</body>
</html>
