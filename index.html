<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Baby 💖</title>

<style>
body{
    margin:0;
    font-family: Poppins, sans-serif;
    overflow:hidden;
    background: linear-gradient(135deg,#f7d6e0,#fcefee,#ffe4ec);
}

/* PAGE */
.page{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
}

.page.active{
    display:flex;
}

/* FINAL */
#final{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background: radial-gradient(circle,#fff0f5,#f7e7dc);
}

button{
    padding:12px 22px;
    border:none;
    border-radius:30px;
    background:#ff7aa2;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔊 MUSIC (IMPORTANT FIX) -->
<audio id="music" loop preload="auto">
    <source src="music.mp3" type="audio/mp3">
</audio>

<!-- START SCREEN -->
<div id="startScreen" class="page active">
    <h1>💖 Tap to Begin</h1>
    <button onclick="startSite()">Start</button>
</div>

<!-- PAGES -->
<div class="page"><h1>Page 1 ❤️</h1></div>
<div class="page"><h1>Page 2 💖</h1></div>
<div class="page"><h1>Page 3 🌸</h1></div>

<!-- FINAL -->
<div id="final">
    <h1>💖 For You</h1>
    <p>You are my happiness</p>
</div>

<!-- NAV -->
<div style="position:fixed;bottom:20px;width:100%;text-align:center;">
    <button onclick="back()">⬅ Back</button>
    <button onclick="next()">Next ➡</button>
</div>

<script>

let pages = document.querySelectorAll(".page");
let current = 0;

/* 🔊 MUSIC SYSTEM (FIXED PROPERLY) */
const music = document.getElementById("music");

function startMusic(){
    music.volume = 1;
    music.currentTime = 0;

    const playPromise = music.play();

    if(playPromise !== undefined){
        playPromise.catch(() => {
            // fallback: force play after next tap anywhere
            document.body.addEventListener("click", () => {
                music.play();
            }, { once:true });
        });
    }
}

/* START SITE */
function startSite(){
    document.getElementById("startScreen").classList.remove("active");
    pages[0].classList.add("active");

    startMusic(); // 🔥 MUSIC STARTS HERE (BEST POSSIBLE WAY)
}

/* SHOW */
function show(i){
    pages.forEach(p=>p.classList.remove("active"));
    if(pages[i]) pages[i].classList.add("active");
}

/* NEXT */
function next(){
    if(current < pages.length - 1){
        current++;
        show(current);
    } else {
        document.querySelector(".nav")?.remove?.();
        document.getElementById("final").style.display="flex";
        pages.forEach(p=>p.classList.remove("active"));
    }
}

/* BACK */
function back(){
    if(current > 0){
        current--;
        show(current);
    }
}

</script>

</body>
</html>
